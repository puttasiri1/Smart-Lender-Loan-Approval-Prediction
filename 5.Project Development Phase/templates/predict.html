<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Smart Lender | Loan Prediction</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<header>

<div class="logo">

<i class="fa-solid fa-building-columns"></i>

Smart Lender

</div>

<nav>

<a href="/">Home</a>

<a href="/predict">Predict</a>

</nav>

</header>

<section class="predict-section">

<div class="form-container">

<div class="form-header">

<h1>Loan Eligibility Prediction</h1>

<p>

Fill the applicant details below and let our Machine Learning
model predict whether the loan will be approved.

</p>

</div>

<form action="/submit" method="POST">

<div class="form-grid">

<div class="input-box">

<label>Gender</label>

<select name="Gender" required>

<option value="0">Male</option>

<option value="1">Female</option>

</select>

</div>

<div class="input-box">

<label>Married</label>

<select name="Married" required>

<option value="0">No</option>

<option value="1">Yes</option>

</select>

</div>

<div class="input-box">

<label>Dependents</label>

<select name="Dependents" required>

<option value="0">0</option>

<option value="1">1</option>

<option value="2">2</option>

<option value="3">3+</option>

</select>

</div>

<div class="input-box">

<label>Education</label>

<select name="Education" required>

<option value="0">Not Graduate</option>

<option value="1">Graduate</option>

</select>

</div>

<div class="input-box">

<label>Self Employed</label>

<select name="Self_Employed" required>

<option value="0">No</option>

<option value="1">Yes</option>

</select>

</div>

<div class="input-box">

<label>Applicant Income</label>

<input
type="number"
name="ApplicantIncome"
placeholder="Enter Income"
required>

</div>

<div class="input-box">

<label>Co Applicant Income</label>

<input
type="number"
name="CoapplicantIncome"
placeholder="Enter Income"
required>

</div>

<div class="input-box">

<label>Loan Amount</label>

<input
type="number"
name="LoanAmount"
placeholder="Loan Amount"
required>

</div>

<div class="input-box">

<label>Loan Term</label>

<input
type="number"
name="Loan_Amount_Term"
placeholder="360"
required>

</div>

<div class="input-box">

<label>Credit History</label>

<select name="Credit_History" required>

<option value="1">Good</option>

<option value="0">Bad</option>

</select>

</div>

<div class="input-box">

<label>Property Area</label>

<select name="Property_Area" required>

<option value="0">Rural</option>

<option value="1">Semiurban</option>

<option value="2">Urban</option>

</select>

</div>

</div>

<div class="button-area">

<button type="submit">

<i class="fa-solid fa-magnifying-glass-chart"></i>

Predict Loan Approval

</button>

</div>

</form>

</div>

</section>

</body>

</html>
